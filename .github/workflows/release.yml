on:
  push:
    branches:
      - main

  release:
    types:
      - published

permissions:
  contents: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: .release-please.json
          manifest-file: .release-please-manifest.json
